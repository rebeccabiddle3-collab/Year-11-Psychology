<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lessons | Year 11 Psychology</title>
<link rel="stylesheet" href="style.css">
<style>
.lessons-layout{display:grid;grid-template-columns:260px 1fr;gap:2rem;align-items:start;margin-top:1.5rem}
@media(max-width:820px){.lessons-layout{grid-template-columns:1fr}}
.ls-sidebar{position:sticky;top:72px;background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.ls-sidebar-head{background:var(--navy);padding:.8rem 1.1rem;color:#fff;font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.ls-topic-btn{display:flex;align-items:center;gap:.65rem;width:100%;padding:.7rem 1.1rem;background:none;border:none;border-bottom:1px solid var(--border);cursor:pointer;text-align:left;font-family:inherit;font-size:.79rem;font-weight:500;color:var(--text);transition:background .15s}
.ls-topic-btn:hover{background:var(--cream)}
.ls-topic-btn.active{background:rgba(201,151,58,.08);font-weight:700;border-left:3px solid var(--gold)}
.ls-tb-dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0}
.ls-topic-btn.active .ls-tb-dot{background:var(--gold)}
.ls-tb-label{flex:1;line-height:1.35}
.ls-tb-sub{font-size:.67rem;color:var(--muted);font-weight:400;display:block;margin-top:.1rem}
.ls-coming-item{padding:.65rem 1.1rem;font-size:.74rem;color:var(--muted);border-bottom:1px solid var(--border);padding-left:1.8rem}
.ls-area{min-width:0}
.ls-unit-tag{display:inline-block;background:var(--navy);color:var(--gold-l);font-size:.61rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:.2rem .65rem;border-radius:20px;margin-bottom:.55rem}
.ls-lesson-card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:.85rem;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:box-shadow .18s}
.ls-lesson-card:hover{box-shadow:0 3px 14px rgba(0,0,0,.07)}
.ls-lh{display:flex;align-items:center;gap:.9rem;padding:.85rem 1.1rem;cursor:pointer;background:var(--white);border:none;width:100%;text-align:left;font-family:inherit;transition:background .15s}
.ls-lh:hover{background:var(--cream)}
.ls-lh.open{background:var(--navy)}
.ls-lh-num{width:34px;height:34px;border-radius:50%;background:var(--cream);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:.7rem;font-weight:700;color:var(--navy);flex-shrink:0;transition:all .2s}
.ls-lh.open .ls-lh-num{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.25);color:#fff}
.ls-lh-meta{flex:1;min-width:0}
.ls-lh-week{font-size:.63rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;font-family:'DM Mono',monospace;transition:color .2s}
.ls-lh.open .ls-lh-week{color:rgba(255,255,255,.5)}
.ls-lh-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--navy);line-height:1.2;transition:color .2s}
.ls-lh.open .ls-lh-title{color:#fff}
.ls-lh-sub{font-size:.72rem;color:var(--muted);margin-top:.1rem;transition:color .2s}
.ls-lh.open .ls-lh-sub{color:rgba(255,255,255,.55)}
.ls-lh-badge{font-size:.59rem;font-weight:700;padding:.1rem .38rem;border-radius:4px;background:rgba(201,151,58,.12);color:var(--gold);border:1px solid rgba(201,151,58,.28);white-space:nowrap;flex-shrink:0;font-family:'DM Mono',monospace;transition:all .2s}
.ls-lh.open .ls-lh-badge{background:rgba(255,255,255,.1);color:var(--gold-l);border-color:rgba(255,255,255,.18)}
.ls-tp-link{font-size:.85rem;text-decoration:none;opacity:.45;flex-shrink:0;transition:opacity .15s;padding:.15rem .2rem;border-radius:4px}
.ls-tp-link:hover{opacity:1;background:rgba(201,151,58,.12)}
.ls-chev{flex-shrink:0;color:var(--muted);transition:transform .25s,color .2s;font-size:.95rem;line-height:1}
.ls-lh.open .ls-chev{transform:rotate(180deg);color:rgba(255,255,255,.6)}
.ls-lb{display:none}
.ls-lb.open{display:block}
.ls-syllabus-bar{background:rgba(13,27,53,.04);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:.6rem 1.2rem;font-size:.72rem;color:var(--muted);line-height:1.5}
.ls-syllabus-bar strong{color:var(--navy)}
.ls-section{padding:1.1rem 1.3rem;border-bottom:1px solid var(--border)}
.ls-section:last-child{border-bottom:none}
.ls-section h4{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:var(--navy);margin-bottom:.75rem;padding-bottom:.45rem;border-bottom:2px solid var(--cream)}
.ls-section h5{font-size:.77rem;font-weight:700;color:var(--navy);margin:.55rem 0 .3rem;letter-spacing:.04em;text-transform:uppercase}
.ls-section p{font-size:.83rem;color:var(--text);line-height:1.65;margin-bottom:.55rem}
.ls-section ul{font-size:.83rem;color:var(--text);line-height:1.65;padding-left:1.25rem;margin-bottom:.6rem}
.ls-section ul li{margin-bottom:.22rem}
.ls-section ul ul{margin-top:.2rem;margin-bottom:.2rem}
.ls-callout{border-radius:7px;padding:.65rem .95rem;font-size:.79rem;line-height:1.55;margin:.65rem 0}
.ls-callout p,.ls-callout ul{font-size:.79rem;margin-bottom:.3rem}
.ls-callout ul{margin-top:.3rem}
.ls-callout.teal{background:rgba(26,122,122,.07);border-left:3px solid var(--teal)}
.ls-callout.gold{background:rgba(201,151,58,.08);border-left:3px solid var(--gold)}
.ls-callout.navy{background:rgba(13,27,53,.05);border-left:3px solid var(--navy)}
.ls-defbox{background:var(--cream);border:1px solid var(--border);border-radius:8px;padding:.65rem .95rem;margin:.6rem 0}
.ls-def-term{font-family:'Playfair Display',serif;font-size:.86rem;font-weight:700;color:var(--navy);margin-bottom:.2rem}
.ls-def-body{font-size:.79rem;color:var(--text);line-height:1.55}
.ls-table-wrap{overflow-x:auto;margin:.65rem 0;border-radius:8px;border:1px solid var(--border)}
.ls-table{width:100%;border-collapse:collapse;font-size:.76rem}
.ls-table thead tr{background:var(--navy);color:#fff}
.ls-table th{padding:.5rem .75rem;text-align:left;font-weight:600;font-size:.69rem;letter-spacing:.04em;white-space:nowrap}
.ls-table td{padding:.48rem .75rem;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.42}
.ls-table tbody tr:last-child td{border-bottom:none}
.ls-table tbody tr:nth-child(even){background:rgba(247,244,239,.7)}
.ls-vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.6rem;margin:.5rem 0}
.ls-vocab-card{background:var(--cream);border:1px solid var(--border);border-radius:7px;padding:.6rem .8rem}
.ls-vocab-term{font-family:'Playfair Display',serif;font-size:.8rem;font-weight:700;color:var(--navy);margin-bottom:.18rem}
.ls-vocab-def{font-size:.72rem;color:var(--muted);line-height:1.43}

/* ── Slide Viewer ─────────────────────────────────────────── */
.sv-wrap{background:#0d1b35;border-top:2px solid var(--gold);padding:1rem 1.2rem}
.sv-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem;gap:.5rem;flex-wrap:wrap}
.sv-title{color:var(--gold-l);font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-family:'DM Mono',monospace}
.sv-range-note{color:rgba(255,255,255,.38);font-size:.6rem;font-family:'DM Mono',monospace}
.sv-controls{display:flex;align-items:center;gap:.5rem}
.sv-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:6px;color:#fff;font-size:.75rem;padding:.3rem .7rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;flex-shrink:0}
.sv-btn:hover{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.3)}
.sv-btn:disabled{opacity:.3;cursor:default}
.sv-counter{color:rgba(255,255,255,.6);font-size:.68rem;font-family:'DM Mono',monospace;min-width:52px;text-align:center}
.sv-stage{position:relative;border-radius:8px;overflow:hidden;background:#000;text-align:center;min-height:180px;display:flex;align-items:center;justify-content:center}
.sv-img{max-width:100%;max-height:480px;width:auto;height:auto;display:block;margin:0 auto;border-radius:6px;object-fit:contain}
.sv-img-error{color:rgba(255,255,255,.4);font-size:.78rem;padding:2rem;text-align:center}
.sv-thumb-row{display:flex;gap:.4rem;margin-top:.65rem;overflow-x:auto;padding-bottom:.3rem;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.2) transparent}
.sv-thumb-row::-webkit-scrollbar{height:3px}
.sv-thumb-row::-webkit-scrollbar-track{background:transparent}
.sv-thumb-row::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px}
.sv-thumb{width:64px;height:36px;object-fit:cover;border-radius:4px;cursor:pointer;border:2px solid transparent;flex-shrink:0;opacity:.55;transition:all .15s}
.sv-thumb:hover{opacity:.85}
.sv-thumb.active{border-color:var(--gold);opacity:1}
.sv-loading{color:rgba(255,255,255,.45);font-size:.75rem;font-family:'DM Sans',sans-serif;padding:1.5rem;text-align:center}
.sv-fullscreen-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:6px;color:rgba(255,255,255,.6);font-size:.68rem;padding:.28rem .6rem;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.sv-fullscreen-btn:hover{background:rgba(255,255,255,.15);color:#fff}
</style>
</head>
<body>
<nav id="site-nav"></nav>
<main>
<div class="wrap">
  <div class="sec-label">📖 Lessons</div>
  <h2 class="sec-title">Lesson Notes</h2>
  <p class="sec-sub">Select a topic from the sidebar. Each lesson expands to show notes, key definitions, tables, and activities.</p>

  <div class="lessons-layout">
    <div class="ls-sidebar">
      <div class="ls-sidebar-head">Unit 1 · Biological Psychology</div>
      <button class="ls-topic-btn active" onclick="showTopic('u1t1',this)">
        <div class="ls-tb-dot"></div>
        <div class="ls-tb-label">Topic 1: The Role of the Brain<span class="ls-tb-sub">8 lesson sets · Available now</span></div>
      </button>
      <button class="ls-topic-btn" onclick="showTopic('u1t2',this)">
        <div class="ls-tb-dot"></div>
        <div class="ls-tb-label">Topic 2: Cognitive Development<span class="ls-tb-sub">7 lesson sets · Available now</span></div>
      </button>
      <button class="ls-topic-btn" onclick="showTopic('u1t3',this)">
        <div class="ls-tb-dot"></div>
        <div class="ls-tb-label">Topic 3: Consciousness &amp; Sleep<span class="ls-tb-sub">7 lesson sets · Available now</span></div>
      </button>
      <div class="ls-sidebar-head">Unit 2 · Individual Behaviour</div>
      <div class="ls-coming-item">Topic 1: Intelligence</div>
      <div class="ls-coming-item">Topic 2: Diagnosis</div>
      <div class="ls-coming-item">Topic 3: Disorders &amp; Treatments</div>
      <div class="ls-coming-item">Topic 4: Emotion &amp; Motivation</div>
    </div>
    <div class="ls-area" id="lesson-area"></div>
  </div>
</div>
</main>
<footer id="site-footer"></footer>
<script src="shared.js"></script>
<script src="lessons_u1t1.js"></script>
<script src="lessons_u1t2.js"></script>
<script src="lessons_u1t3.js"></script>
<script>
function showTopic(id, btn) {
  document.querySelectorAll('.ls-topic-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  if (id === 'u1t1') renderTopic(U1T1_LESSONS, 'Unit 1 · Topic 1', 'The Role of the Brain', '8 lesson sets · 15 hours · Weeks 1–5 Term 1 · Syllabus sections 1.1.1 – 1.1.8');
  if (id === 'u1t2') renderTopic(U1T2_LESSONS, 'Unit 1 · Topic 2', 'Cognitive Development', '5 lesson sets · 15 hours · Weeks 6–10 Term 1 · Syllabus sections 1.2.1 – 1.2.5');
  if (id === 'u1t3') renderTopic(U1T3_LESSONS, 'Unit 1 · Topic 3', 'Consciousness & Sleep', '7 lesson sets · 15 hours · Term 2 Weeks 1–8 · Syllabus sections 1.3.1 – 1.3.7');
}

function renderTopic(lessons, unitTag, topicTitle, metaText) {
  const area = document.getElementById('lesson-area');
  let html = `<div style="margin-bottom:1.5rem">
    <span class="ls-unit-tag">${unitTag}</span>
    <h3 style="font-family:'Playfair Display',serif;font-size:1.45rem;color:var(--navy);margin:.3rem 0 .35rem">${topicTitle}</h3>
    <p style="font-size:.81rem;color:var(--muted)">${metaText}</p>
  </div>`;
  lessons.forEach(lesson => {
    const hasSlides = lesson.slides && lesson.slides.folder;
    const slideCount = hasSlides ? (lesson.slides.end - lesson.slides.start + 1) : 0;
    const slideBadge = hasSlides ? `<span style="font-size:.58rem;background:rgba(26,122,122,.12);color:var(--teal);border:1px solid rgba(26,122,122,.25);padding:.1rem .38rem;border-radius:4px;font-family:'DM Mono',monospace;margin-left:.4rem">🖼 ${slideCount} slides</span>` : '';
    html += `
    <div class="ls-lesson-card" id="lc-${lesson.id}">
      <button class="ls-lh" onclick="toggleLesson('${lesson.id}',this)" aria-expanded="false">
        <div class="ls-lh-num">${lesson.num}</div>
        <div class="ls-lh-meta">
          <div class="ls-lh-week">${lesson.week}</div>
          <div class="ls-lh-title">${lesson.title}${slideBadge}</div>
          <div class="ls-lh-sub">${lesson.subtitle}</div>
        </div>
        <div class="ls-lh-badge">${lesson.duration}</div>
        <a class="ls-tp-link" href="termplan.html#tp-${lesson.id}" onclick="event.stopPropagation();" title="View in Term Plan">📅</a>
        <span class="ls-chev">▾</span>
      </button>
      <div class="ls-lb" id="lb-${lesson.id}">
        <div class="ls-syllabus-bar"><strong>Syllabus dot point:</strong> ${lesson.syllabus}</div>
        ${hasSlides ? buildSlideViewer(lesson) : ''}
        ${lesson.sections.map(s => `<div class="ls-section ${s.type === 'activity' ? 'ls-section-activity' : ''}"><h4>${s.heading}</h4>${s.content}</div>`).join('')}
      </div>
    </div>`;
  });
  area.innerHTML = html;
}

function buildSlideViewer(lesson) {
  const { folder, start, end } = lesson.slides;
  const count = end - start + 1;
  return `
  <div class="sv-wrap" id="sv-${lesson.id}">
    <div class="sv-header">
      <div>
        <div class="sv-title">📽 Lesson Slides</div>
        <div class="sv-range-note">Slides ${start}–${end} of "${folder}" folder · ${count} slides</div>
      </div>
      <div class="sv-controls">
        <button class="sv-btn" onclick="svNav('${lesson.id}',-1)" id="sv-prev-${lesson.id}">◀ Prev</button>
        <span class="sv-counter" id="sv-count-${lesson.id}">1 / ${count}</span>
        <button class="sv-btn" onclick="svNav('${lesson.id}',1)" id="sv-next-${lesson.id}">Next ▶</button>
        <button class="sv-fullscreen-btn" onclick="svFullscreen('${lesson.id}')" title="Fullscreen">⛶</button>
      </div>
    </div>
    <div class="sv-stage" id="sv-stage-${lesson.id}">
      <div class="sv-loading">Loading slide ${start}…</div>
    </div>
    <div class="sv-thumb-row" id="sv-thumbs-${lesson.id}"></div>
  </div>`;
}

// Slide viewer state
const svState = {};

function svInit(lessonId) {
  if (svState[lessonId]) return; // already initialised
  const lesson = [...(typeof U1T1_LESSONS !== 'undefined' ? U1T1_LESSONS : []),
                  ...(typeof U1T2_LESSONS !== 'undefined' ? U1T2_LESSONS : []),
                  ...(typeof U1T3_LESSONS !== 'undefined' ? U1T3_LESSONS : [])]
                  .find(l => l.id === lessonId);
  if (!lesson || !lesson.slides) return;
  const { folder, start, end } = lesson.slides;
  svState[lessonId] = { folder, start, end, current: start };
  svRender(lessonId);
  svBuildThumbs(lessonId);
}

function svSlideUrl(folder, slideNum) {
  // Path relative to the site root where folders live
  return `${folder}/Slide${slideNum}.jpeg`;
}

function svRender(lessonId) {
  const s = svState[lessonId];
  const stage = document.getElementById('sv-stage-' + lessonId);
  const counter = document.getElementById('sv-count-' + lessonId);
  const prevBtn = document.getElementById('sv-prev-' + lessonId);
  const nextBtn = document.getElementById('sv-next-' + lessonId);
  if (!stage) return;

  const idx = s.current - s.start + 1;
  const total = s.end - s.start + 1;
  counter.textContent = `${idx} / ${total}`;
  prevBtn.disabled = s.current <= s.start;
  nextBtn.disabled = s.current >= s.end;

  // Update active thumbnail
  document.querySelectorAll(`#sv-thumbs-${lessonId} .sv-thumb`).forEach(t => {
    t.classList.toggle('active', parseInt(t.dataset.num) === s.current);
  });

  // Scroll active thumb into view
  const activeThumb = document.querySelector(`#sv-thumbs-${lessonId} .sv-thumb.active`);
  if (activeThumb) activeThumb.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});

  // Load main image
  stage.innerHTML = '<div class="sv-loading">Loading…</div>';
  const img = new Image();
  img.className = 'sv-img';
  img.alt = `Slide ${s.current}`;
  img.onload = () => { stage.innerHTML = ''; stage.appendChild(img); };
  img.onerror = () => {
    stage.innerHTML = `<div class="sv-img-error">
      <div style="font-size:1.5rem;margin-bottom:.5rem">🖼</div>
      <div>Slide ${s.current} not found</div>
      <div style="margin-top:.3rem;font-size:.65rem;opacity:.6">Expected: ${svSlideUrl(s.folder, s.current)}</div>
      <div style="margin-top:.5rem;font-size:.68rem;color:rgba(255,255,255,.5)">Upload the "<strong style="color:rgba(255,255,255,.7)">${s.folder}</strong>" folder to your GitHub repo alongside this site.</div>
    </div>`;
  };
  img.src = svSlideUrl(s.folder, s.current);
}

function svBuildThumbs(lessonId) {
  const s = svState[lessonId];
  const row = document.getElementById('sv-thumbs-' + lessonId);
  if (!row) return;
  let html = '';
  for (let n = s.start; n <= s.end; n++) {
    html += `<img class="sv-thumb${n === s.start ? ' active' : ''}" 
      src="${svSlideUrl(s.folder, n)}" 
      data-num="${n}" 
      alt="Slide ${n}" 
      title="Slide ${n}"
      onerror="this.style.background='rgba(255,255,255,.05)';this.style.border='1px dashed rgba(255,255,255,.1)'"
      onclick="svGoTo('${lessonId}', ${n})">`;
  }
  row.innerHTML = html;
}

function svNav(lessonId, dir) {
  const s = svState[lessonId];
  if (!s) return;
  s.current = Math.max(s.start, Math.min(s.end, s.current + dir));
  svRender(lessonId);
}

function svGoTo(lessonId, num) {
  const s = svState[lessonId];
  if (!s) return;
  s.current = num;
  svRender(lessonId);
}

function svFullscreen(lessonId) {
  const stage = document.getElementById('sv-stage-' + lessonId);
  const img = stage.querySelector('.sv-img');
  if (img && img.requestFullscreen) img.requestFullscreen();
  else if (stage.requestFullscreen) stage.requestFullscreen();
}

// Keyboard nav for active slide viewer
document.addEventListener('keydown', e => {
  // Find any open lesson with a slide viewer
  const openCards = document.querySelectorAll('.ls-lb.open .sv-wrap');
  if (!openCards.length) return;
  const lessonId = openCards[openCards.length - 1].id.replace('sv-', '');
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); svNav(lessonId, 1); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); svNav(lessonId, -1); }
});

function toggleLesson(id, btn) {
  const body = document.getElementById('lb-' + id);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  btn.classList.toggle('open', !isOpen);
  btn.setAttribute('aria-expanded', String(!isOpen));
  if (!isOpen) {
    setTimeout(() => btn.closest('.ls-lesson-card').scrollIntoView({behavior:'smooth',block:'nearest'}), 60);
    // Init slide viewer if this lesson has slides
    setTimeout(() => svInit(id), 80);
  }
}

// Initial render
renderTopic(U1T1_LESSONS, 'Unit 1 · Topic 1', 'The Role of the Brain', '8 lesson sets · 15 hours · Weeks 1–5 Term 1 · Syllabus sections 1.1.1 – 1.1.8');

// Auto-open from term plan sessionStorage link
const pendingLesson = sessionStorage.getItem('openLesson');
const pendingTopic = sessionStorage.getItem('openTopic') || 'u1t1';
if (pendingLesson) {
  sessionStorage.removeItem('openLesson');
  sessionStorage.removeItem('openTopic');
  // Switch to correct topic first
  const topicBtn = document.querySelector(`.ls-topic-btn[onclick*="'${pendingTopic}'"]`);
  showTopic(pendingTopic, topicBtn);
  setTimeout(() => {
    const btn = document.querySelector(`#lc-${pendingLesson} .ls-lh`);
    if (btn && !btn.classList.contains('open')) toggleLesson(pendingLesson, btn);
    document.getElementById('lc-' + pendingLesson)?.scrollIntoView({behavior:'smooth', block:'start'});
  }, 200);
}

// Expose for term plan deep links
window.openLesson = function(id) {
  showTopic('u1t1', document.querySelector('.ls-topic-btn'));
  setTimeout(() => {
    const btn = document.querySelector(`#lc-${id} .ls-lh`);
    if (btn && !btn.classList.contains('open')) toggleLesson(id, btn);
    document.getElementById('lc-' + id)?.scrollIntoView({behavior:'smooth', block:'start'});
  }, 100);
};
</script>
</body>
</html>
